services:
  immich-epaper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immich-epaper
    restart: unless-stopped
    environment:
      IMMICH_URL: "http://immich-server:2283"
      IMMICH_API_KEY: "${IMMICH_API_KEY}"
      IMMICH_ALBUM_ID: "${IMMICH_ALBUM_ID:-}"
      IMMICH_PEOPLE: "${IMMICH_PEOPLE:-}"
      IMMICH_REQUIRE_ALL_PEOPLE: "${IMMICH_REQUIRE_ALL_PEOPLE:-false}"
      IMMICH_EXCLUDED_PEOPLE: "${IMMICH_EXCLUDED_PEOPLE:-}"
      IMMICH_DATE_AFTER: "${IMMICH_DATE_AFTER:-2021-01-01}"
      IMMICH_DATE_BEFORE: "${IMMICH_DATE_BEFORE:-today}"
      IMMICH_SEARCH_BATCH: "${IMMICH_SEARCH_BATCH:-250}"
      IMMICH_CACHE: "${IMMICH_CACHE:-false}"
      FRAME_ROTATE: "${FRAME_ROTATE:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8684:8080"
    networks:
      - immich
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  immich:
    external: true
